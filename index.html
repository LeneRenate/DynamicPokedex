<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>PokeDex</title>
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <header>
      <a href="#">
        <img
          src="./images/pokedex.png"
          alt="pokedex from the pokemon-series"
          id="pokedexImg"
        />
      </a>
      <img
        src="https://fontmeme.com/permalink/251105/2b24d8746889672115f71bba6a127b14.png"
        alt="PokeDex - in pokemon-font"
        id="HeadingImg"
      />
    </header>
    <main>
      <section id="searchSection"></section>
      <div id="pokemonSelect">
        <section id="genSelect"></section>
        <section id="typeGrid"></section>
      </div>
      <section id="pokemonDisplay"></section>

      <!-- The Modal -->
      <div id="myModal" class="modal">
        <!-- Modal content -->
        <div class="modal-content">
          <span id="close">X</span>
        </div>
      </div>
    </main>
  </body>
</html>
