<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styleRoot.css" />
    <link rel="stylesheet" href="style.css" />
    <title>PokeDex</title>
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loadingScreen">
      <div class="pokeballLoader"></div>
      <p>
        Hold on!
        <br />
        Catching 'em all...
      </p>
    </div>

    <header>
      <a href="#">
        <img
          src="./images/pokedex.png"
          alt="pokedex from the pokemon-series"
          id="pokedexImg"
        />
      </a>
      <a href="#">
        <img
          src="https://fontmeme.com/permalink/251105/2b24d8746889672115f71bba6a127b14.png"
          alt="PokeDex - in pokemon-font"
          id="HeadingImg"
        />
      </a>
    </header>
    <main>
      <section id="searchSection"></section>
      <div id="pokemonSelect">
        <section id="genSelect">
          <button class="genBtn" data-gen="1">Gen I</button>
          <button class="genBtn" data-gen="2">Gen II</button>
          <button class="genBtn" data-gen="3">Gen III</button>
          <button class="genBtn" data-gen="4">Gen IV</button>
          <button class="genBtn" data-gen="5">Gen V</button>
          <button class="genBtn" data-gen="6">Gen VI</button>
          <button class="genBtn" data-gen="7">Gen VII</button>
          <button class="genBtn" data-gen="8">Gen VIII</button>
          <button class="genBtn" data-gen="9">Gen IX</button>
        </section>
        <section id="typeGrid"></section>
      </div>
      <section id="pokemonDisplay"></section>

      <!-- The Modal -->
      <div id="myModal" class="modal">
        <!-- Modal content -->
        <div class="modal-content">
          <span id="close">X</span>
        </div>
      </div>
    </main>
  </body>
</html>
