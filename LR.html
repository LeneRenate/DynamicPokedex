<!DOCTYPE html>
<html>
  <body style="font-family: sans-serif; text-align: center; margin-top: 100px">
    <h2>How To LeneRenate</h2>

    <button onclick="howToLeneRenate('funny')">Funny</button>
    <button onclick="howToLeneRenate('makes sense')">Makes sense</button>
    <button onclick="howToLeneRenate('nonsense')">Nonsense</button>
    <button onclick="howToLeneRenate('messed up')">Messed up</button>

    <p id="response" style="margin-top: 40px; font-size: 1.2em"></p>

    <script>
      function howToLeneRenate(statement) {
        let response = document.getElementById("response");

        if (statement === "funny") {
          response.innerText =
            "😂 LeneRenate laughs and says, 'You’re ridiculous — I love it.'";
        } else if (statement === "makes sense") {
          response.innerText =
            "🤓 LeneRenate nods slowly — 'Finally, something that actually makes sense.'";
        } else if (statement === "nonsense") {
          response.innerText =
            "😏 LeneRenate smirks — 'Sweetie, that made zero sense, but sure.'";
        } else if (statement === "messed up") {
          response.innerText =
            "🤣 LeneRenate bursts out laughing — 'Oh my god, that was such a fail. Iconic.'";
        } else {
          response.innerText =
            "🤔 LeneRenate blinks — '...What was that supposed to be?'";
        }
      }
    </script>
  </body>
</html>
